<!-- login.html -->
{% extends "base.html" %}
{% block title %}Operator Login{% endblock %}
{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <!-- <span class="logo-icon">📦</span> -->
      <h1>Energous VI</h1>
      <p>Sign in with your Employee Number</p>
    </div>

    <div id="msg" class="msg hidden"></div>

    <div class="field-group">
      <label for="emp">Employee Number</label>
      <input id="emp" type="text" placeholder="Enter employee number" autocomplete="off" autofocus />
    </div>

    <button id="btn-login" class="btn-primary">Sign In</button>
  </div>
</div>

<script>
  const empInput = document.getElementById("emp");
  const btn      = document.getElementById("btn-login");
  const msg      = document.getElementById("msg");

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = "msg " + type;
  }

  async function doLogin() {
    const employee_num = empInput.value.trim();
    if (!employee_num) { showMsg("Please enter your employee number.", "error"); return; }

    btn.disabled = true;
    btn.textContent = "Signing in…";

    const res  = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ employee_num })
    });
    const data = await res.json();

    if (data.ok) {
      showMsg("Welcome, " + data.operator_en + "! Redirecting…", "success");
      setTimeout(() => window.location.href = "/", 800);
    } else {
      showMsg(data.message || "Login failed.", "error");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  }

  btn.addEventListener("click", doLogin);
  empInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
{% endblock %}
