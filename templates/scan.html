<!-- scan.html -->
{% extends "base.html" %}
{% block title %}Packing Scan{% endblock %}
{% block body %}
<div class="app-wrap">

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo-icon">📦</span>
      <span class="header-title">Energous Visual Inspection Scanning</span>
    </div>
    <div class="header-right">
      <span class="operator-badge">👤 {{ operator_en }}</span>
      <select id="sel-shift" class="sel-shift">
        <option value="A">A</option>
        <option value="B">B</option>
      </select>
      <button class="btn-ghost" id="btn-logout">Logout</button>
    </div>
  </header>

  <!-- Tray Counter -->
  <div class="tray-section">
    <div class="tray-counter-wrap">
      <div class="tray-counter-label">Units in Tray</div>
      <div class="tray-counter-display">
        <span id="count-current">0</span>
        <span class="tray-sep">/</span>
        <span class="tray-total">{{ tray_limit }}</span>
      </div>
      <div class="tray-bar-wrap">
        <div id="tray-bar" class="tray-bar" style="width:0%"></div>
      </div>
      <div id="tray-status" class="tray-status-label"></div>
    </div>
    <button class="btn-reset" id="btn-reset">🔄 New Tray</button>
  </div>

  <!-- Scan Input -->
  <div class="scan-section">
    <div class="scan-row">
      <input id="scan-prog-id" class="scan-input" type="text"
             placeholder="Scan or type prog id…" autocomplete="off" autofocus />
      <button id="btn-scan-prog" class="btn-primary btn-scan">CHECK PROG ID</button>
    </div>
    <div id="scan-msg-prog" class="scan-msg hidden"></div>
  </div>
  <div class="scan-section">
    <div class="scan-row">
      <input id="scan-serial" class="scan-input" type="text"
             placeholder="Scan its serial number to verify…" autocomplete="off" disabled />
      <button id="btn-scan-serial" class="btn-primary btn-scan" disabled>SCAN</button>
    </div>
    <div id="scan-msg-serial" class="scan-msg hidden"></div>
  </div>

  <!-- Log Table -->
  <div class="log-section">
    <div class="log-header">
      <h2>Scan Log</h2>
      <button class="btn-ghost btn-sm" id="btn-clear-log">Clear Log</button>
    </div>
    <div class="table-wrap">
      <table class="log-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Serial Number</th>
            <th>PO Number</th>
            <th>Status</th>
            <th>Message</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr id="empty-row"><td colspan="6" class="empty-log">No scans yet. Start scanning above.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const TRAY_LIMIT = {{ tray_limit }};
  let count = 0;
  let logRows = [];
  let verifiedProgId = null;   // holds the prog_id once step 1 passes

  const countEl   = document.getElementById("count-current");
  const trayBar   = document.getElementById("tray-bar");
  const trayLbl   = document.getElementById("tray-status");

  const scanProgId  = document.getElementById("scan-prog-id");
  const scanSerial  = document.getElementById("scan-serial");
  const msgProg     = document.getElementById("scan-msg-prog");
  const msgSerial   = document.getElementById("scan-msg-serial");
  const logBody     = document.getElementById("log-body");
  const emptyRow    = document.getElementById("empty-row");
  const shiftSel    = document.getElementById("sel-shift");
  const btnProg     = document.getElementById("btn-scan-prog");
  const btnSerial   = document.getElementById("btn-scan-serial");

  function updateCounter(n) {
    count = n;
    countEl.textContent = n;
    const pct = Math.min((n / TRAY_LIMIT) * 100, 100);
    trayBar.style.width = pct + "%";
    trayBar.className = "tray-bar" + (n >= TRAY_LIMIT ? " full" : n >= TRAY_LIMIT * 0.8 ? " warn" : "");
    trayLbl.textContent = n >= TRAY_LIMIT ? "✅ Tray Full — Start a New Tray" : "";
    trayLbl.className = "tray-status-label" + (n >= TRAY_LIMIT ? " full" : "");
  }

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = "scan-msg " + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = "scan-msg hidden", 4000);
  }

  function addLogRow(serial, po, status, message) {
    emptyRow.style.display = "none";
    const idx  = logRows.length + 1;
    const time = new Date().toLocaleTimeString();
    const tr   = document.createElement("tr");
    tr.className = "log-row-" + status;
    tr.innerHTML = `
      <td>${idx}</td>
      <td class="mono">${serial}</td>
      <td class="mono">${po || "—"}</td>
      <td><span class="badge badge-${status}">${status.toUpperCase()}</span></td>
      <td>${message}</td>
      <td>${time}</td>
    `;
    logBody.prepend(tr);
    logRows.push(tr);
  }

  function resetProgStep() {
    verifiedProgId = null;
    scanSerial.value = "";
    scanSerial.disabled = true;
    btnSerial.disabled = true;
    scanProgId.value = "";
    scanProgId.disabled = false;
    scanProgId.focus();
  }

  async function doCheckProg() {
    const progId = scanProgId.value.trim();
    if (!progId) { showMsg(msgProg, "Please enter a prog id.", "error"); return; }

    btnProg.disabled = true;
    const res  = await fetch("/api/check-prog", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prog_id: progId })
    });
    const data = await res.json();
    btnProg.disabled = false;

    showMsg(msgProg, data.message, data.ok ? "success" : "error");

    if (data.ok) {
      verifiedProgId = progId;
      scanProgId.disabled = true;
      scanSerial.disabled = false;
      scanSerial.focus();
    }
  }

  async function doScanSerial() {
    if (count >= TRAY_LIMIT) {
      showMsg(msgSerial, "Tray is full (50/50). Click 'New Tray' to reset.", "error");
      return;
    }
    if (!verifiedProgId) {
      showMsg(msgSerial, "Scan and verify a prog id first.", "error");
      return;
    }
    const serial = scanSerial.value.trim();
    if (!serial) { showMsg(msgSerial, "Please enter a serial number.", "error"); return; }

    btnSerial.disabled = true;

    const res  = await fetch("/api/scan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prog_id: verifiedProgId, serial_num: serial, shift: shiftSel.value })
    });
    const data = await res.json();

    btnSerial.disabled = false;

    const statusMap = { ok: "ok", already_packed: "warn", fail: "fail", not_found: "fail", mismatch: "fail" };
    const uiStatus  = statusMap[data.status] || "fail";

    showMsg(msgSerial, data.message, data.ok ? "success" : "error");
    addLogRow(serial, data.unit?.po_num, uiStatus, data.message);

    if (data.ok) {
      updateCounter(count + 1);
      resetProgStep();          // ready for the next unit's prog_id
    } else {
      scanSerial.value = "";
      scanSerial.focus();
    }
  }

  btnProg.addEventListener("click", doCheckProg);
  scanProgId.addEventListener("keydown", e => { if (e.key === "Enter") doCheckProg(); });

  btnSerial.addEventListener("click", doScanSerial);
  scanSerial.addEventListener("keydown", e => { if (e.key === "Enter") doScanSerial(); });

  document.getElementById("btn-reset").addEventListener("click", () => {
    if (!confirm("Start a new tray? The counter will reset to 0.")) return;
    updateCounter(0);
    resetProgStep();
    showMsg(msgProg, "New tray started.", "success");
  });

  document.getElementById("btn-clear-log").addEventListener("click", () => {
    logRows.forEach(r => r.remove());
    logRows = [];
    emptyRow.style.display = "";
  });

  document.getElementById("btn-logout").addEventListener("click", async () => {
    await fetch("/api/logout", { method: "POST" });
    window.location.href = "/login";
  });
</script>
{% endblock %}
